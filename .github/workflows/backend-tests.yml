name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run unit tests
        run: bash backend/tests/unit/run_unit_tests.sh

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run integration tests
        run: bash backend/tests/integration/run_integration_tests.sh

  coverage-gate:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Coverage gate passed
        run: echo "All tests passed and coverage gate met."

  promote-to-main:
    runs-on: ubuntu-latest
    needs: coverage-gate
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Promote to main
        run: echo "Promoting branch to main (configure merge here)."
